# Application
server.port=8082
spring.application.name=tick-data-dedup

# Kafka
streams.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# Kafka Streams
streams.application-id=tick-data-dedup
streams.state-dir=./store

# Kafka Streams Properties
streams.processing-guarantee=exactly_once_v2
streams.commit-interval-ms=1000
streams.cache-max-bytes-buffering=10485760
streams.num-stream-threads=1
streams.topology-optimization=all
streams.replication-factor=-1

# Application-specific configuration
dedup.input-topic=qubic-tick-data-incoming
dedup.output-topic=qubic-tick-data-unique
dedup.retention-duration=7d
dedup.store-name=tick-data-dedup-store
dedup.changelog-enabled=true

# make sure to crash on unexpected messages
spring.jackson.deserialization.fail-on-unknown-properties=true

# Actuator endpoints
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# Log kafka config on startup
logging.level.org.springframework.kafka.config=DEBUG
logging.level.org.apache.kafka.streams.processor.internals.StoreChangelogReader=INFO
