# Application
server.port=8080
spring.application.name=transactions-dedup

# Kafka
streams.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# Kafka Streams
# the application id is used for the consumer group name
streams.application-id=transactions-dedup
# dedup data
streams.state-dir=./store

# Kafka Streams Properties
streams.processing-guarantee=exactly_once_v2
streams.commit-interval-ms=500
streams.cache-max-bytes-buffering=10485760
streams.num-stream-threads=1
streams.topology-optimization=all
streams.replication-factor=-1
# streams.max-request-size-in-mb=

# Application-specific configuration
dedup.input-topic=qubic-transactions-incoming
dedup.output-topic=qubic-transactions-unique
dedup.retention-duration=7d
dedup.window-size=1d
dedup.store-name=transactions-dedup-store
dedup.caching-enabled=false
dedup.changelog-enabled=false

# make sure to crash on unexpected messages
spring.jackson.deserialization.fail-on-unknown-properties=true

# Actuator endpoints
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# Log kafka config on startup
logging.level.org.springframework.kafka.config=DEBUG
logging.level.org.apache.kafka.streams.processor.internals.StoreChangelogReader=INFO
