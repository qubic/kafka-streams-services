name: Push event-logs-dedup branch to image repository

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - 'feature/tick-dedup'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build module (skip tests)
        run: mvn -B -pl event-logs-dedup -am -DskipTests package

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Release version env variable
        run: |
          echo "RELEASE_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./event-logs-dedup
          file: ./event-logs-dedup/Dockerfile
          push: true
          tags: ghcr.io/qubic/event-logs-dedup:${{ env.RELEASE_VERSION }}

